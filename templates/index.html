<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board App</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-2xl bg-white/90 backdrop-blur-md rounded-3xl shadow-2xl border border-white/30 p-6">

        <h1 class="text-4xl font-extrabold text-center bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-6">
            Task Board
        </h1>

        <!-- Input Section -->
        <div class="flex gap-3 mb-6">
            <input
                type="text"
                id="taskInput"
                placeholder="Enter a task..."
                class="flex-1 border border-gray-200 bg-white/80 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"
            >

            <button
                onclick="addTask()"
                class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white px-5 py-2 rounded-xl font-medium shadow-md hover:shadow-lg transition-all duration-300"
            >
                Add Task
            </button>
        </div>

        <!-- Progress -->
        <div class="mb-4">
            <div class="flex justify-between mb-2">
                <span class="font-medium text-gray-700">Progress</span>
                <span id="progressText" class="text-sm text-gray-600">0%</span>
            </div>

            <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                <div
                    id="progressBar"
                    class="bg-gradient-to-r from-green-400 to-emerald-500 h-4 transition-all duration-300"
                    style="width: 0%"
                ></div>
            </div>
        </div>

        <!-- Task Statistics -->
        <div class="flex justify-between text-sm text-gray-600 mb-5">
            <span id="totalTasks">Total: 0</span>
            <span id="completedTasks">Completed: 0</span>
            <span id="pendingTasks">Pending: 0</span>
        </div>

        <!-- Empty State -->
        <div
            id="emptyState"
            class="text-center text-gray-400 py-6"
        >
            No tasks added yet
        </div>

        <!-- Task List -->
        <div id="taskList" class="space-y-3"></div>

    </div>

    <script src="/static/app.js"></script>
</body>
</html>
